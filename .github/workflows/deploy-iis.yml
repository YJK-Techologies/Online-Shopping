name: IIS Auto Deploy OS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # -------- FRONTEND --------
      - name: Frontend install
        run: |
          npm install
      - name: Frontend build
        run: |
          npm run build
      - name: Copy frontend build to IIS
        run: |
          xcopy /E /Y /I build "C:\inetpub\wwwroot\OS\build"
      # -------- BACKEND --------
      - name: Backend install
        run: |
          cd backend
          npm install
      - name: Restart backend using PM2
        run: |
          pm2 restart os-backend
